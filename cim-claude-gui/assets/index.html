<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIM Claude GUI Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Immediate styles to prevent flash of unstyled content */
        body {
            font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
        }
        
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #6b7280;
            flex-direction: column;
            gap: 16px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading CIM Claude GUI Manager...</div>
    </div>
    
    <script type="module">
        import init from './pkg/cim_claude_gui.js';
        
        // Hide loading indicator once WASM is initialized
        init().then(() => {
            document.getElementById('loading').style.display = 'none';
        }).catch(err => {
            console.error('Failed to initialize WASM module:', err);
            document.getElementById('loading').innerHTML = `
                <div style="text-align: center;">
                    <div>❌ Failed to load CIM Claude GUI</div>
                    <div style="font-size: 14px; margin-top: 8px; color: #ef4444;">
                        Please check the console for more details.
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
