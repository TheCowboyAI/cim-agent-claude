# NATS Node 3 Configuration - Follower Node
server_name: "nats-node-3"
port: 4222
monitor_port: 8222

# Cluster configuration
cluster {
  name: "cim-claude-cluster"
  listen: 0.0.0.0:6222
  routes: [
    nats://nats-node-1:6222
    nats://nats-node-2:6222
  ]
}

# JetStream configuration
jetstream {
  store_dir: "/opt/nats/jetstream"
  max_memory_store: 2GB
  max_file_store: 20GB
  
  # Domain configuration for multi-tenant isolation
  domain: "cim-claude"
}

# Account-based security (same as other nodes)
accounts {
  $SYS {
    users = [
      {user: "system", password: "$2a$10$T0yA2ZyRnjfMoXqeQyqAcO8VRhgOyFhWw4mPzKdK7fELKJgJ6oKzO"}
    ]
  }
  
  CIM_CLAUDE_ADAPTER {
    jetstream: {
      max_memory: 4GB
      max_file: 40GB
      max_streams: 100
      max_consumers: 500
    }
    
    users = [
      {
        user: "claude_admin"
        password: "$2a$10$UQcVzYKOKPHzQhYxKzKzO.K8UcYKOKPHzQhYxKzKzO.K8UcYKOKPHz"
        permissions: {
          publish: {
            allow: ["claude.>", "$JS.API.>"]
          }
          subscribe: {
            allow: ["claude.>", "_INBOX.>", "$JS.API.>", "$JS.ACK.>"]
          }
        }
      }
      {
        user: "claude_service"  
        password: "$2a$10$VRdVzYKOKPHzQhYxKzKzO.K8UcYKOKPHzQhYxKzKzO.K8UcYKOKPHz"
        permissions: {
          publish: {
            allow: ["claude.conv.>", "claude.tool.>", "claude.config.>"]
          }
          subscribe: {
            allow: ["claude.conv.>", "claude.tool.>", "claude.config.>", "_INBOX.>"]
          }
        }
      }
      {
        user: "claude_readonly"
        password: "$2a$10$WSeVzYKOKPHzQhYxKzKzO.K8UcYKOKPHzQhYxKzKzO.K8UcYKOKPHz"
        permissions: {
          subscribe: {
            allow: ["claude.conv.evt.>", "claude.conv.resp.>", "claude.tool.results.>"]
          }
        }
      }
    ]
  }
}

# System account
system_account: "$SYS"

# Performance tuning
max_connections: 65536
max_subscriptions: 0
max_pending: 67108864  # 64MB
max_payload: 2097152   # 2MB
write_deadline: "5s"

# TLS configuration
tls {
  cert_file: "/opt/nats/certs/server.crt"
  key_file: "/opt/nats/certs/server.key"
  ca_file: "/opt/nats/certs/ca.crt"
  verify: true
  timeout: 10
}

# Logging
logtime: true
log_file: "/var/log/nats/nats-node-3.log"
debug: false
trace: false

# Health check endpoint
http: "0.0.0.0:8222"