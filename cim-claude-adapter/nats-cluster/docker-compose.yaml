# Docker Compose for CIM Claude NATS Cluster
version: '3.8'

services:
  # NATS Node 1 (Leader)
  nats-node-1:
    image: nats:2.10-alpine
    container_name: cim-nats-1
    hostname: nats-node-1
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
      - "6222:6222"   # Cluster routes
      - "8080:8080"   # WebSocket
    volumes:
      - ./node-1-config.conf:/etc/nats/nats-server.conf:ro
      - ./certs:/opt/nats/certs:ro
      - nats-1-data:/opt/nats/jetstream
      - nats-1-logs:/var/log/nats
    command: ["--config", "/etc/nats/nats-server.conf"]
    environment:
      - NATS_SERVER_NAME=nats-node-1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nats-cluster

  # NATS Node 2
  nats-node-2:
    image: nats:2.10-alpine
    container_name: cim-nats-2
    hostname: nats-node-2
    ports:
      - "4223:4222"   # Client connections
      - "8223:8222"   # HTTP monitoring
      - "6223:6222"   # Cluster routes
    volumes:
      - ./node-2-config.conf:/etc/nats/nats-server.conf:ro
      - ./certs:/opt/nats/certs:ro
      - nats-2-data:/opt/nats/jetstream
      - nats-2-logs:/var/log/nats
    command: ["--config", "/etc/nats/nats-server.conf"]
    environment:
      - NATS_SERVER_NAME=nats-node-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nats-cluster
    depends_on:
      - nats-node-1

  # NATS Node 3
  nats-node-3:
    image: nats:2.10-alpine
    container_name: cim-nats-3
    hostname: nats-node-3
    ports:
      - "4224:4222"   # Client connections
      - "8224:8222"   # HTTP monitoring
      - "6224:6222"   # Cluster routes
    volumes:
      - ./node-3-config.conf:/etc/nats/nats-server.conf:ro
      - ./certs:/opt/nats/certs:ro
      - nats-3-data:/opt/nats/jetstream
      - nats-3-logs:/var/log/nats
    command: ["--config", "/etc/nats/nats-server.conf"]
    environment:
      - NATS_SERVER_NAME=nats-node-3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nats-cluster
    depends_on:
      - nats-node-1

  # NATS Monitoring Dashboard (optional)
  nats-surveyor:
    image: natsio/nats-surveyor:latest
    container_name: cim-nats-surveyor
    ports:
      - "7777:7777"
    environment:
      - NATS_SURVEYOR_SERVERS=nats://nats-node-1:4222,nats://nats-node-2:4222,nats://nats-node-3:4222
      - NATS_SURVEYOR_CREDS=/opt/nats/creds/surveyor.creds
    volumes:
      - ./creds:/opt/nats/creds:ro
    networks:
      - nats-cluster
    restart: unless-stopped
    depends_on:
      - nats-node-1
      - nats-node-2
      - nats-node-3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cim-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - nats-cluster
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cim-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - nats-cluster
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  nats-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  nats-1-data:
    driver: local
  nats-1-logs:
    driver: local
  nats-2-data:
    driver: local
  nats-2-logs:
    driver: local
  nats-3-data:
    driver: local
  nats-3-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local