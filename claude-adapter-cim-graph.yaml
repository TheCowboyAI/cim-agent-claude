# Claude API to NATS Adapter - Complete CIM Graph
# Generated by SAGE orchestration of CIM experts

domain:
  name: "claude-adapter"
  version: "1.0.0"
  description: "CIM adapter enabling Claude API integration with NATS event system"
  
# Category Theory Foundations (from @cim-expert)
mathematical_structure:
  category: "ClaudeIntegration"
  objects:
    - name: "HttpRequest"
      type: "external_input"
    - name: "ClaudeCommand"  
      type: "internal_event"
    - name: "ClaudeResponse"
      type: "internal_event"
    - name: "HttpResponse"
      type: "external_output"
      
  morphisms:
    - name: "RequestToCommand"
      source: "HttpRequest"
      target: "ClaudeCommand"
      implementation: "request_transformer"
    - name: "ResponseToHttp"
      source: "ClaudeResponse"  
      target: "HttpResponse"
      implementation: "response_transformer"
      
  functors:
    - name: "ApiAdapter"
      source_category: "HTTP"
      target_category: "Events"
      preserves: ["correlation_id", "causation_chain"]

# Domain Model (from @ddd-expert)
aggregates:
  ClaudeConversation:
    aggregate_root: true
    entities:
      - ConversationId
      - SessionId
      - ConversationState
      - ConversationContext
    value_objects:
      - Prompt
      - ClaudeResponse  
      - CorrelationChain
      - Exchange
    invariants:
      - "prompt_response_pairing"
      - "context_window_limit"
      - "correlation_chain_integrity"
    business_rules:
      - "max_prompts_per_minute: 10"
      - "context_retention_hours: 24"
      - "max_prompt_length: 50000"

# Domain Events
events:
  ConversationStarted:
    aggregate: "ClaudeConversation"
    properties:
      - conversationId: ConversationId
      - initialPrompt: Prompt
      - correlationId: CorrelationId
    nats_subject: "claude.event.{session_id}.started"
    
  PromptSent:
    aggregate: "ClaudeConversation" 
    properties:
      - conversationId: ConversationId
      - prompt: Prompt
      - correlationId: CorrelationId
      - eventId: EventId
    nats_subject: "claude.cmd.{session_id}.prompt"
    
  ResponseReceived:
    aggregate: "ClaudeConversation"
    properties:
      - conversationId: ConversationId
      - response: ClaudeResponse
      - causationId: EventId
    nats_subject: "claude.resp.{session_id}.content"
    
  ConversationEnded:
    aggregate: "ClaudeConversation"
    properties:
      - conversationId: ConversationId
      - reason: EndReason
      - correlationId: CorrelationId
    nats_subject: "claude.event.{session_id}.ended"

# NATS Infrastructure (from @nats-expert)
nats:
  streams:
    CLAUDE_COMMANDS:
      subjects: ["claude.cmd.*", "claude.cmd.*.>"]
      storage: file
      retention: workqueue
      max_age: "24h"
      max_msgs: 100000
      duplicate_window: "2m"
      
    CLAUDE_RESPONSES:
      subjects: ["claude.resp.*", "claude.resp.*.>"]
      storage: file
      retention: interest
      max_age: "1h" 
      max_msgs: 50000
      
    CLAUDE_EVENTS:
      subjects: ["claude.event.*", "claude.event.*.>"]
      storage: file
      retention: limits
      max_age: "30d"
      max_msgs: 1000000
      
  consumers:
    claude-command-processor:
      stream: "CLAUDE_COMMANDS"
      durable_name: "claude-cmd-processor"
      deliver_policy: new
      ack_policy: explicit
      ack_wait: "30s"
      max_deliver: 3
      
    claude-response-distributor:
      stream: "CLAUDE_RESPONSES"
      durable_name: "claude-resp-distributor" 
      deliver_policy: all
      ack_policy: explicit
      
  kv_stores:
    CLAUDE_SESSIONS:
      description: "Claude session state and context"
      max_value_size: "1MB"
      history: 10
      ttl: "24h"
      
  security:
    accounts:
      CLAUDE_ADAPTER:
        users:
          claude-adapter-service:
            permissions:
              publish: ["claude.event.>", "claude.resp.>"]
              subscribe: ["claude.cmd.>"]
            limits:
              max_payload: "1MB"
              max_connections: 10

# Port and Adapter Implementation
ports:
  ClaudePort:
    type: "interface"
    operations:
      - receiveCommand: "ClaudeRequest -> Either[Error, CommandReceived]"
      - publishResponse: "ClaudeResponse -> Either[Error, ResponsePublished]" 
      - subscribeToEvents: "(Event -> Unit) -> Subscription"

adapters:
  NATSClaudeAdapter:
    implements: "ClaudePort"
    technology: "golang"
    dependencies:
      - "github.com/nats-io/nats.go"
      - "github.com/nats-io/jetstream"
    configuration:
      nats_url: "${NATS_URL}"
      credentials_file: "${NATS_CREDS}"
      max_reconnects: 10
      reconnect_wait: "2s"
      
  HttpApiAdapter:
    type: "external_interface"
    technology: "golang"
    framework: "gin-gonic/gin"
    endpoints:
      - path: "/claude/conversation"
        method: "POST"
        handler: "startConversation"
      - path: "/claude/conversation/{id}/prompt"
        method: "POST" 
        handler: "sendPrompt"
      - path: "/claude/conversation/{id}/stream"
        method: "GET"
        handler: "streamEvents"

# Implementation Components
services:
  ConversationService:
    type: "domain_service"
    technology: "golang"
    responsibilities:
      - "Manage conversation lifecycle"
      - "Enforce business invariants"
      - "Coordinate event publishing"
    dependencies:
      - ConversationRepository
      - ClaudeApiClient
      - EventBus
      
  ClaudeApiClient:
    type: "external_service"
    technology: "golang"
    responsibilities:
      - "Communicate with Claude API"
      - "Handle rate limiting"
      - "Manage authentication"
    configuration:
      api_key: "${CLAUDE_API_KEY}"
      base_url: "https://api.anthropic.com"
      timeout: "30s"
      retry_attempts: 3

repositories:
  ConversationRepository:
    type: "aggregate_repository"
    technology: "golang"
    storage: "postgresql"
    tables:
      conversations:
        columns:
          - id: UUID PRIMARY KEY
          - session_id: UUID NOT NULL
          - state: VARCHAR(20) NOT NULL
          - created_at: TIMESTAMP NOT NULL
          - updated_at: TIMESTAMP NOT NULL
      conversation_events:
        columns:
          - id: UUID PRIMARY KEY
          - conversation_id: UUID REFERENCES conversations(id)
          - event_type: VARCHAR(50) NOT NULL
          - event_data: JSONB NOT NULL
          - correlation_id: UUID NOT NULL
          - causation_id: UUID
          - occurred_at: TIMESTAMP NOT NULL

# Deployment Configuration  
deployment:
  containers:
    claude-adapter:
      image: "claude-adapter:latest"
      ports:
        - "8080:8080"  # HTTP API
      environment:
        - NATS_URL: "nats://nats:4222"
        - NATS_CREDS: "/etc/nats/claude-adapter.creds"
        - CLAUDE_API_KEY: "${CLAUDE_API_KEY}"
        - DATABASE_URL: "${DATABASE_URL}"
      volumes:
        - "/etc/nats:/etc/nats:ro"
      dependencies:
        - nats
        - postgres
        
    nats:
      image: "nats:latest"
      ports:
        - "4222:4222"
        - "8222:8222"
      command: 
        - "--jetstream"
        - "--store_dir=/data"
      volumes:
        - "nats_data:/data"
        
  kubernetes:
    namespace: "claude-adapter"
    resources:
      claude-adapter:
        replicas: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi" 
            cpu: "500m"

# Monitoring and Observability
observability:
  metrics:
    - name: "claude_requests_total"
      type: "counter"
      labels: ["method", "status"]
    - name: "claude_response_duration"
      type: "histogram"  
      labels: ["conversation_id"]
    - name: "conversation_active_total"
      type: "gauge"
    - name: "nats_message_lag"
      type: "gauge"
      labels: ["stream", "consumer"]
      
  tracing:
    enabled: true
    sampler: 0.1
    exporter: "jaeger"
    
  logging:
    level: "info"
    format: "json"
    correlation_tracking: true

# Testing Strategy
testing:
  unit_tests:
    framework: "testify"
    coverage_threshold: 80
    
  integration_tests:
    - name: "ConversationLifecycle"
      description: "Test complete conversation flow"
      components: ["HttpApi", "NATSAdapter", "ConversationService"]
      
  contract_tests:
    - name: "ClaudeApiContract" 
      description: "Verify Claude API integration"
      type: "consumer_driven"
      
  load_tests:
    - name: "ConcurrentConversations"
      description: "Test multiple simultaneous conversations"
      target_rps: 100
      duration: "5m"

# Mathematical Validation
validation:
  category_laws:
    identity: "forall f: A -> B, id_B ∘ f = f = f ∘ id_A"
    associativity: "forall f,g,h: (h ∘ g) ∘ f = h ∘ (g ∘ f)"
    
  functor_laws:
    identity_preservation: "F(id_A) = id_F(A)"
    composition_preservation: "F(g ∘ f) = F(g) ∘ F(f)"
    
  invariant_checks:
    - "Every HTTP request has exactly one HTTP response"
    - "Event correlation chains are well-formed"
    - "Conversation state transitions are valid"
    - "Context windows respect configured limits"